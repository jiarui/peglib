name: quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format-check:
    name: clang-format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-20
        run: |
          # Pin to clang-format-20 so CI matches local dev toolchain.
          # ubuntu-24.04 default is clang-format-18, which produces
          # slightly different output (CRLF-init lambdas, BinPackArguments
          # edge cases). The canonical version for this repo is 20.x.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-20

      - name: Check formatting
        run: |
          find include test -name '*.h' -o -name '*.cpp' \
            | grep -v doctest \
            | xargs clang-format-20 --style=file --dry-run -Werror

  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    env:
      CC: clang-22
      CXX: clang++-22
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-22 + clang-tidy
        run: |
          # Pin to clang-22 so CI matches the local dev toolchain (LLVM 22.x).
          # The previous pin to clang-17 caused a behavioral mismatch with
          # bugprone-unchecked-optional-access: clang-tidy's flow analysis
          # cannot prove optionals are engaged after a doctest REQUIRE macro,
          # producing false positives that varied between v17 and v22. CI and
          # local are now both v22 so results match exactly. clang-tidy is
          # scoped to a dedicated TU (test/tidy_check.cpp) that only includes
          # the library umbrella header, so the doctest macro limitation never
          # comes into play and the check stays fully enabled there. The
          # canonical version for this repo is 22.x.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-22 clang-tidy-22

      - name: Configure with clang-tidy
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPEGLIB_BUILD_TESTS=ON \
            -DPEGLIB_ENABLE_CLANG_TIDY=ON

      - name: Build (runs clang-tidy)
        run: cmake --build build -j

  coverage:
    name: coverage (gcc-13)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    env:
      CC: gcc-13
      CXX: g++-13
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-13 + gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 gcovr

      - name: Configure with coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPEGLIB_BUILD_TESTS=ON \
            -DPEGLIB_COVERAGE=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report + enforce threshold (>= 80% lines)
        run: |
          # --fail-under-line exits non-zero if line coverage is below 80%.
          gcovr --root . --filter 'include/' \
                --fail-under-line 80 \
                --print-summary \
                --html-details build/coverage.html \
                --txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage*.html

  sanitizer:
    name: ASan/UBSan (gcc-13)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    env:
      CC: gcc-13
      CXX: g++-13
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-13
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13

      - name: Configure with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPEGLIB_BUILD_TESTS=ON \
            -DPEGLIB_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1
