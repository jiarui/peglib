name: build-test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          # --- Linux / GCC ---
          - name: "GCC 11 (ubuntu-24.04)"
            os: ubuntu-24.04
            cc: gcc-11
            cxx: g++-11
          - name: "GCC 13 (ubuntu-24.04)"
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
          - name: "GCC 15 (ubuntu-24.04)"
            os: ubuntu-24.04
            cc: gcc-15
            cxx: g++-15
          # --- Linux / Clang ---
          - name: "Clang 14 (ubuntu-24.04)"
            os: ubuntu-24.04
            cc: clang-14
            cxx: clang++-14
          - name: "Clang 17 (ubuntu-24.04)"
            os: ubuntu-24.04
            cc: clang-17
            cxx: clang++-17
          # --- Windows / MSVC ---
          - name: "MSVC 19.30 (windows-2022)"
            os: windows-2022
            cc: cl
            cxx: cl
          - name: "MSVC latest (windows-2022)"
            os: windows-2022
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Install compilers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-11 g++-11 \
            gcc-13 g++-13 \
            gcc-15 g++-15 \
            clang-14 clang++-14 \
            clang-17 clang++-17

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPEGLIB_BUILD_TESTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPEGLIB_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
